<script>
/* nutti-underline: BEST 탭 언더라인 너비/위치 글자에 맞춤 */
window.addEventListener('load', function(){
  // 각 탭 ::after 너비/위치를 텍스트에 맞춤
  var as=document.querySelectorAll('#header .inner .top_nav_box .top_category > ul > li > a');
  var css='';
  as.forEach(function(a,i){
    var range=document.createRange();
    range.selectNodeContents(a);
    var textRect=range.getBoundingClientRect();
    var aRect=a.getBoundingClientRect();
    var tw=textRect.width;
    var aw=aRect.width;
    if(tw < aw - 2){
      // 텍스트의 a 내부 left offset
      var textLeft=Math.round(textRect.left - aRect.left);
      css+='#header .inner .top_nav_box .top_category > ul > li:nth-child('+(i+1)+') > a::after{width:'+Math.round(tw)+'px!important;left:'+textLeft+'px!important;}';
    }
  });
  if(css){var s=document.createElement('style');s.textContent=css;document.head.appendChild(s);}
});

  // CART 버튼 클릭 시 장바구니 담고 패널 열기
  (function(){
    var PANEL_ID='nuttiCartPanel';
    /* ── 장바구니(담기 패널) 스크래핑 설정. 주의: 헤더카트 패널은 별도 구현 2벌(아래 ncp IIFE / js/main.js)이 같은 값을 하드코딩 → 중복 정리 필요 ── */
    var NUTTI_CART_CFG={ basketUrl:'/order/basket.html', dataVar:'aBasketProductData', badgeSel:'.EC-Layout_Basket-count-display' };
    function ncWarn(m){ try{ console.warn('[NUTTI cart]', m); }catch(_){} }
    // 장바구니 담기 직후 basket.html 로 이동하려는 기본동작을 차단(armed 구간) 후 패널을 연다.
    var navGuardOn=false, navGuardUntil=0;
    function navGuardActive(){ return navGuardOn && Date.now()<navGuardUntil; }
    function armNavGuard(){ navGuardOn=true; navGuardUntil=Date.now()+6000; }
    function disarmNavGuard(){ navGuardOn=false; }
    (function installNavGuard(){
      try{
        var origAssign=window.location.assign.bind(window.location);
        window.location.assign=function(u){ if(navGuardActive() && /order\/basket/.test(String(u))){ disarmNavGuard(); openAndLoadSafe(); return; } return origAssign(u); };
      }catch(e){}
      try{
        var origReplace=window.location.replace.bind(window.location);
        window.location.replace=function(u){ if(navGuardActive() && /order\/basket/.test(String(u))){ disarmNavGuard(); openAndLoadSafe(); return; } return origReplace(u); };
      }catch(e){}
    })();
    function openAndLoadSafe(){ try{ openNuttiCartPanel(); loadNuttiCart(); }catch(e){} }
    var armed=false;          // CART 버튼을 눌렀을 때만 동작
    var armedUntil=0;
    function isArmed(){ return armed && Date.now()<armedUntil; }
    function disarm(){ armed=false; }

    function openNuttiCartPanel(){
      var panel=document.getElementById(PANEL_ID);
      if(!panel) return;
      panel.style.transition='opacity 0.3s ease, transform 0.3s ease';
      panel.style.opacity='1'; panel.style.transform='translateX(0)';
      panel.style.pointerEvents='auto'; panel.setAttribute('aria-hidden','false');
    }
    function closeNuttiCartPanel(){
      var panel=document.getElementById(PANEL_ID);
      if(!panel) return;
      panel.style.opacity='0'; panel.style.transform='translateX(16px)';
      panel.style.pointerEvents='none'; panel.setAttribute('aria-hidden','true');
    }
    function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
    function renderEmpty(){
      var body=document.getElementById('nuttiCartBody');
      if(body) body.innerHTML='<div class="ncp-empty">장바구니가 비어 있습니다.</div>';
      var t=document.getElementById('nuttiCartTotal'); if(t) t.textContent='0원';
      var ef=document.getElementById('nuttiCartFoot'); if(ef) ef.style.display='none';
    }
    function loadNuttiCart(){
      var body=document.getElementById('nuttiCartBody');
      if(body) body.innerHTML='<div class="ncp-loading">\uBD88\uB7EC\uC624\uB294 \uC911...</div>';
      /* \uC228\uACA8\uC9C4 iframe\uC73C\uB85C \uC2E4\uC81C \uC7A5\uBC14\uAD6C\uB2C8 \uB370\uC774\uD130(aBasketProductData) \uB85C\uB4DC \u2192 \uC218\uB7C9\uC81C\uC5B4 \uD3EC\uD568 \uB80C\uB354 + \uC11C\uBC84 \uBC18\uC601 */
      try{ if(window._nuttiCartFrame&&window._nuttiCartFrame.parentNode) window._nuttiCartFrame.parentNode.removeChild(window._nuttiCartFrame); }catch(e){}
      var fr=document.createElement('iframe');
      fr.style.cssText='position:fixed;width:1px;height:1px;left:-9999px;top:-9999px;border:0;opacity:0;pointer-events:none;';
      fr.src=NUTTI_CART_CFG.basketUrl;
      window._nuttiCartFrame=fr;
      fr.addEventListener('load',function(){
        var raw;
        try{ raw=fr.contentWindow[NUTTI_CART_CFG.dataVar]; }catch(e){ ncWarn('iframe 접근 실패(교차출처?): '+e); }
        if(typeof raw==='undefined'){ ncWarn('장바구니 데이터('+NUTTI_CART_CFG.dataVar+') 없음 — Cafe24 변경 또는 빈 장바구니'); }
        nuttiRenderCart(raw||[]);
      });
      document.body.appendChild(fr);
    }
    var NUTTI_SHIP=2500;
    var nuttiCartState=[];
    function nuttiEsc2(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
    function nuttiRenderCart(data){
      var body=document.getElementById('nuttiCartBody');
      if(!data||!data.length){ renderEmpty(); return; }
      nuttiCartState=[];
      var h='';
      for(var i=0;i<data.length;i++){
        var p=data[i];
        var src=(p.product_image||''); if(src&&src.indexOf('//')===0) src='https:'+src;
        var nm=(p.product_name||'');
        var pr=parseInt(p.product_price)||0;
        var qt=parseInt(p.quantity||p.basket_quantity)||1;
        var no=p.basket_prd_no||'';
        nuttiCartState.push({price:pr,qty:qt,no:no});
        h+='<div class="ncp-item" data-idx="'+i+'" data-prdno="'+no+'">';
        h+='<img class="ncp-item-thumb" src="'+nuttiEsc2(src)+'" alt="">';
        h+='<div class="ncp-item-info"><span class="ncp-item-name">'+nuttiEsc2(nm)+'</span>';
        h+='<div class="ncp-item-meta">';
        h+='<div class="ncp-qty">';
        h+='<button type="button" class="ncp-qty-btn ncp-qty-minus" data-idx="'+i+'" aria-label="\uC218\uB7C9 \uAC10\uC18C">\u2212</button>';
        h+='<span class="ncp-qty-num" data-idx="'+i+'">'+qt+'</span>';
        h+='<button type="button" class="ncp-qty-btn ncp-qty-plus" data-idx="'+i+'" aria-label="\uC218\uB7C9 \uC99D\uAC00">+</button>';
        h+='</div>';
        h+='<span class="ncp-item-price" data-idx="'+i+'">'+(pr*qt).toLocaleString()+'\uC6D0</span>';
        h+='</div></div>';
        h+='<button type="button" class="ncp-item-del" data-idx="'+i+'" data-prdno="'+no+'" aria-label="\uC0AD\uC81C">\uC0AD\uC81C</button>';
        h+='</div>';
      }
      if(body) body.innerHTML=h;
      var sf=document.getElementById('nuttiCartFoot'); if(sf) sf.style.display='block';
      nuttiUpdateTotals();
      nuttiBindCart();
    }
    function nuttiUpdateTotals(){
      var sub=0;
      for(var i=0;i<nuttiCartState.length;i++){ sub+=nuttiCartState[i].price*nuttiCartState[i].qty; }
      var total=sub>0?sub+NUTTI_SHIP:0;
      var t=document.getElementById('nuttiCartTotal'); if(t) t.textContent=total.toLocaleString()+'\uC6D0';
    }
    var nuttiPersistTimers={};
    function nuttiPersistQty(idx,q){
      try{
        if(nuttiPersistTimers[idx])clearTimeout(nuttiPersistTimers[idx]);
        nuttiPersistTimers[idx]=setTimeout(function(){
          try{
            var fr=window._nuttiCartFrame; if(!fr||!fr.contentWindow)return;
            var w=fr.contentWindow;
            var inp=w.document.getElementById('quantity_id_'+idx);
            if(inp){inp.value=q;}
            if(w.Basket&&typeof w.Basket.modifyQuantity==='function'){ w.Basket.modifyQuantity('quantity_id_'+idx); }
          }catch(e){}
        },550);
      }catch(e){}
    }
    function nuttiSetQty(idx,q){
      if(!nuttiCartState[idx])return;
      if(q<1)q=1;
      nuttiCartState[idx].qty=q;
      var body=document.getElementById('nuttiCartBody');
      if(body){
        var numEl=body.querySelector('.ncp-qty-num[data-idx="'+idx+'"]');
        if(numEl)numEl.textContent=q;
        var prEl=body.querySelector('.ncp-item-price[data-idx="'+idx+'"]');
        if(prEl)prEl.textContent=(nuttiCartState[idx].price*q).toLocaleString()+'\uC6D0';
      }
      nuttiUpdateTotals();
      nuttiPersistQty(idx,q);
    }
    var nuttiCartBound=false;
    function nuttiBindCart(){
      var body=document.getElementById('nuttiCartBody');
      if(nuttiCartBound||!body)return; nuttiCartBound=true;
      body.addEventListener('click',function(e){
        var minus=e.target.closest&&e.target.closest('.ncp-qty-minus');
        var plus=e.target.closest&&e.target.closest('.ncp-qty-plus');
        var del=e.target.closest&&e.target.closest('.ncp-item-del');
        if(minus){e.preventDefault();var i=parseInt(minus.getAttribute('data-idx'));nuttiSetQty(i,(nuttiCartState[i]?nuttiCartState[i].qty:1)-1);return;}
        if(plus){e.preventDefault();var j=parseInt(plus.getAttribute('data-idx'));nuttiSetQty(j,(nuttiCartState[j]?nuttiCartState[j].qty:1)+1);return;}
        if(del){e.preventDefault();var di=parseInt(del.getAttribute('data-idx'));var row=del.closest('.ncp-item');if(row)row.style.display='none';if(nuttiCartState[di]){nuttiCartState[di].qty=0;nuttiCartState[di].price=0;}nuttiUpdateTotals();try{var fr=window._nuttiCartFrame;if(fr&&fr.contentWindow&&fr.contentWindow.Basket&&typeof fr.contentWindow.Basket.deleteBasket==='function'){var inp=fr.contentWindow.document.getElementById('basket_chk_id_'+di);if(inp)inp.checked=true;}}catch(e2){}return;}
      });
    }
    function openAndLoad(){ disarm(); openNuttiCartPanel(); loadNuttiCart(); }
    window.openNuttiCartPanel=openNuttiCartPanel;
    window.loadNuttiCart=loadNuttiCart;
    window.closeNuttiCartPanel=closeNuttiCartPanel;

    // ===== 네비게이션 차단: CART 담기 직후 장바구니 페이지로 이동/팝업하는 기본동작 무력화 =====
    function neutralizeNav(){
      ['move_basket_page','go_basket','layer_basket','layer_basket2'].forEach(function(fn){
        if(typeof window[fn]==='function' && !window[fn]._nuttiWrapped){
          var orig=window[fn];
          var wrapped=function(){
            if(isArmed()){ openAndLoad(); return false; } // 이동 대신 패널
            return orig.apply(window, arguments);
          };
          wrapped._nuttiWrapped=true; window[fn]=wrapped;
        }
      });
    }
    // basket_result_action 도 후킹 (정상 담기 완료 콜백)
    function wrapBR(name){
      if(typeof window[name]==='function' && !window[name]._nuttiWrapped){
        var orig=window[name];
        var wrapped=function(sType,sGroup,aData){
          if(String(sType)==='2'){ setTimeout(openAndLoad,150); return false; } // 담기 성공 시 패널 (이동 차단)
          return orig.apply(window, arguments);
        };
        wrapped._nuttiWrapped=true; window[name]=wrapped;
      }
    }
    function neutralizeBRA(){
      wrapBR('basket_result_action_channel');
      wrapBR('basket_result_action');
    }
    function installAll(){ neutralizeNav(); neutralizeBRA(); }

    // ===== CART 버튼: 네이티브 onclick(product_submit) 그대로 두고, 누를 때 armed 표시 =====
    function bindCartButtons(){
      document.querySelectorAll('#actionCart, .actionCart').forEach(function(btn){
        if(btn._nuttiArm) return; btn._nuttiArm=true;
        btn.addEventListener('click', function(){
          armed=true; armedUntil=Date.now()+8000;
          armNavGuard();
          installAll();
          // 담기 처리(AJAX) 후 장바구니를 새로 불러와 패널을 연다.
          // product_submit 가 콜백을 호출하지 않는 경우가 있어 무조건 지연 후 연다.
          setTimeout(openAndLoad, 900);
          setTimeout(openAndLoad, 1800);
        }, false);
      });
    }
    function bindPanelControls(){
      var closeBtn=document.getElementById('nuttiCartClose');
      if(closeBtn && !closeBtn._nb){ closeBtn._nb=true; closeBtn.addEventListener('click',function(e){e.preventDefault();closeNuttiCartPanel();}); }
    }
    function syncCartBadge(){
      try{
        var badge=document.getElementById('nuttiCartBadge');
        if(!badge)return;
        /* Cafe24 \uAE30\uBCF8 \uD5E4\uB354 \uC7A5\uBC14\uAD6C\uB2C8 \uCE74\uC6B4\uD2B8\uB97C \uADF8\uB300\uB85C \uBBF8\uB7EC\uB9C1(\uBAA8\uB4E0 \uD398\uC774\uC9C0\uC5D0 \uC874\uC7AC) */
        var src=document.querySelector(NUTTI_CART_CFG.badgeSel);
        var n=0;
        if(src){ var t=(src.textContent||'').replace(/[^0-9]/g,''); n=parseInt(t)||0; }
        badge.textContent=n;
        badge.style.display = n>0 ? '' : 'none';
      }catch(e){}
    }
    function initNutti(){ installAll(); bindCartButtons(); bindPanelControls(); syncCartBadge(); }
    initNutti();
    if(document.readyState==='loading'){ document.addEventListener('DOMContentLoaded', initNutti); }
    window.addEventListener('load', initNutti);
    // 영구 인터벌: Cafe24가 함수를 재정의해도 다시 후킹
    setInterval(initNutti, 500);
  })();
</script>

<script>
(function(){
  function setNavDataText() {
    var links = document.querySelectorAll('#header .inner .top_nav_box .top_category > ul > li > a');
    links.forEach(function(a) {
      if(!a.getAttribute('data-text')) {
        a.setAttribute('data-text', a.textContent.trim());

/* nutti-cart-widget - 모든 페이지 활성화 */
(function(){
  /* 장바구니 페이지에서는 플로팅 버튼 숨기기 */
  if(window.location.pathname.indexOf('/order/basket')===0){
    var qf=document.getElementById('quick_float');
    if(qf)qf.style.display='none';
    return;
  }
  var panel=document.getElementById('nuttiCartPanel');
  if(!panel)return;
  var cartBody=document.getElementById('nuttiCartBody'),
      cartFoot=document.getElementById('nuttiCartFoot'),
      cartTotal=document.getElementById('nuttiCartTotal'),
      cartBadge=document.getElementById('nuttiCartBadge');
  var cartLoaded=false,cartFrame=null;
  function ncpEsc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
  function ncpClose(){panel.classList.remove('is-open');panel.style.opacity='0';panel.style.transform='translateX(16px)';panel.style.pointerEvents='none';panel.setAttribute('aria-hidden','true');}
  function ncpRender(data){
    try{
      if(!data||!data.length){
        if(cartBody)cartBody.innerHTML='<div class="ncp-empty">장바구니가 비어있습니다.</div>';
        if(cartFoot)cartFoot.style.display='none';
        if(cartBadge)cartBadge.textContent='0';
        ncpState=[];
        return;
      }
      ncpState=[];
      var html='';
      for(var i=0;i<data.length;i++){
        var p=data[i];
        var img=ncpEsc(p.product_image||'');
        var nm=ncpEsc(p.product_name||'');
        var pr=parseInt(p.product_price)||0;
        var qt=parseInt(p.quantity||p.basket_quantity)||1;
        var no=p.basket_prd_no||'';
        ncpState.push({price:pr,qty:qt,no:no});
        html+='<div class="ncp-item" data-prdno="'+no+'" data-idx="'+i+'">';
        html+='<img class="ncp-item-thumb" src="'+img+'" alt="">';
        html+='<div class="ncp-item-info"><span class="ncp-item-name">'+nm+'</span>';
        html+='<div class="ncp-item-meta">';
        html+='<div class="ncp-qty">';
        html+='<button type="button" class="ncp-qty-btn ncp-qty-minus" data-idx="'+i+'" aria-label="수량 감소">\u2212</button>';
        html+='<span class="ncp-qty-num" data-idx="'+i+'">'+qt+'</span>';
        html+='<button type="button" class="ncp-qty-btn ncp-qty-plus" data-idx="'+i+'" aria-label="수량 증가">+</button>';
        html+='</div>';
        html+='<span class="ncp-item-price" data-idx="'+i+'">'+(pr*qt).toLocaleString()+'원</span>';
        html+='</div></div>';
        html+='<button type="button" class="ncp-item-del" data-prdno="'+no+'" aria-label="삭제">삭제</button>';
        html+='</div>';
      }
      if(cartBody)cartBody.innerHTML=html;
      ncpUpdateTotals();
      if(cartBadge)cartBadge.textContent=data.length;
      if(cartFoot)cartFoot.style.display='';
      ncpBindRowEvents();
    }catch(e){if(cartBody)cartBody.innerHTML='<div class="ncp-empty">로드 오류: '+ncpEsc(e.message)+'</div>';}
  }
  var ncpState=[];
  var NCP_SHIP=2500;
  function ncpUpdateTotals(){
    var sub=0;
    for(var i=0;i<ncpState.length;i++){sub+=ncpState[i].price*ncpState[i].qty;}
    var total=sub>0?sub+NCP_SHIP:0;
    if(cartTotal)cartTotal.textContent=total.toLocaleString()+'원';
  }
  function ncpSetQty(idx,q){
    if(!ncpState[idx])return;
    if(q<1)q=1;
    ncpState[idx].qty=q;
    if(cartBody){
      var numEl=cartBody.querySelector('.ncp-qty-num[data-idx="'+idx+'"]');
      if(numEl)numEl.textContent=q;
      var prEl=cartBody.querySelector('.ncp-item-price[data-idx="'+idx+'"]');
      if(prEl)prEl.textContent=(ncpState[idx].price*q).toLocaleString()+'\uC6D0';
    }
    ncpUpdateTotals();
    ncpPersistQty(idx,q);
  }
  /* \uC11C\uBC84 \uC7A5\uBC14\uAD6C\uB2C8 \uC218\uB7C9\uC744 \uC2E4\uC81C\uB85C \uBC18\uC601(iframe \uB0B4 Cafe24 Basket API \uAD6C\uB3D9, \uB514\uBC14\uC6B4\uC2A4) */
  var ncpPersistTimers={};
  function ncpPersistQty(idx,q){
    try{
      if(ncpPersistTimers[idx])clearTimeout(ncpPersistTimers[idx]);
      ncpPersistTimers[idx]=setTimeout(function(){
        try{
          if(!cartFrame||!cartFrame.contentWindow)return;
          var w=cartFrame.contentWindow;
          var inp=w.document.getElementById('quantity_id_'+idx);
          if(inp){inp.value=q;}
          if(w.Basket&&typeof w.Basket.modifyQuantity==='function'){
            w.Basket.modifyQuantity('quantity_id_'+idx);
          }
        }catch(e){}
      },550);
    }catch(e){}
  }
  var ncpRowBound=false;
  function ncpBindRowEvents(){
    if(ncpRowBound||!cartBody)return; ncpRowBound=true;
    cartBody.addEventListener('click',function(e){
      var minus=e.target.closest&&e.target.closest('.ncp-qty-minus');
      var plus=e.target.closest&&e.target.closest('.ncp-qty-plus');
      var del=e.target.closest&&e.target.closest('.ncp-item-del');
      if(minus){e.preventDefault();var i=parseInt(minus.getAttribute('data-idx'));ncpSetQty(i,(ncpState[i]?ncpState[i].qty:1)-1);return;}
      if(plus){e.preventDefault();var j=parseInt(plus.getAttribute('data-idx'));ncpSetQty(j,(ncpState[j]?ncpState[j].qty:1)+1);return;}
      if(del){e.preventDefault();var row=del.closest('.ncp-item');if(row)row.style.display='none';var di=row?parseInt(row.getAttribute('data-idx')):-1;if(ncpState[di]){ncpState[di].qty=0;ncpState[di].price=0;}ncpUpdateTotals();return;}
    });
  }
  function ncpLoad(){
    if(cartBody)cartBody.innerHTML='<div class="ncp-loading">불러오는 중…</div>';
    if(cartFrame&&cartFrame.parentNode)cartFrame.parentNode.removeChild(cartFrame);
    cartFrame=document.createElement('iframe');
    cartFrame.style.cssText='position:fixed;width:1px;height:1px;left:-9999px;top:-9999px;border:0;opacity:0;pointer-events:none;';
    cartFrame.src='/order/basket.html';
    cartFrame.addEventListener('load',function(){
      var d=[],raw;
      try{ raw=cartFrame.contentWindow.aBasketProductData; }catch(e){ try{console.warn('[NUTTI cart/ncp] iframe 접근 실패: '+e);}catch(_){} }
      if(typeof raw==='undefined'){ try{console.warn('[NUTTI cart/ncp] aBasketProductData 없음 — Cafe24 변경 또는 빈 장바구니');}catch(_){} }
      d=raw||[];
      ncpRender(d);
      cartLoaded=true;
    });
    document.body.appendChild(cartFrame);
  }
  function ncpIsVisible(){
    if(!panel)return false;
    var cs=window.getComputedStyle(panel);
    /* \uC2E4\uC81C \uD654\uBA74 \uD45C\uC2DC \uC0C1\uD0DC\uB9CC\uC73C\uB85C \uD310\uB2E8 (\uD074\uB798\uC2A4/\uB0B4\uBD80\uD50C\uB798\uADF8 \uBB34\uC2DC) */
    return parseFloat(cs.opacity)>0.01 && cs.pointerEvents!=='none' && cs.display!=='none';
  }
  function ncpOpen(){
    if(!panel)return;
    panel.classList.add('is-open');
    panel.style.transition='opacity 0.3s ease, transform 0.3s ease';
    panel.style.opacity='1';
    panel.style.transform='translateX(0)';
    panel.style.pointerEvents='auto';
    panel.style.display='';
    panel.setAttribute('aria-hidden','false');
    if(!cartLoaded)ncpLoad();
  }
  function ncpInit(){
    var btn=document.getElementById('nuttiCartBtn');
    if(!btn)return;
    /* \uCD5C\uC801\uD654/\uC678\uBD80 \uC2A4\uD06C\uB9BD\uD2B8\uAC00 \uBC14\uC778\uB529\uD55C \uC624\uB798\uB41C \uD578\uB4E4\uB7EC\uB97C \uC81C\uAC70\uD558\uACE0(\uD074\uB860 \uAD50\uCCB4) \uC6B0\uB9AC \uD1A0\uAE00\uB9CC \uB0A8\uAE34\uB2E4 */
    if(!btn._ncToggleBound){
      var fresh=btn.cloneNode(true);
      if(btn.parentNode){ btn.parentNode.replaceChild(fresh,btn); }
      btn=fresh;
      btn.removeAttribute('data-ncbound');
      btn._ncToggleBound=true;
      btn.addEventListener('click',function(e){
        e.preventDefault();e.stopPropagation();
        if(ncpIsVisible()){ ncpClose(); } else { ncpOpen(); }
      });
    }
    /* X(\uB2EB\uAE30) \uBC84\uD2BC: \uB3D9\uC77C\uD55C ncpClose \uACBD\uB85C\uB85C \uD1B5\uC77C, \uC911\uBCF5 \uBC14\uC778\uB529 \uBC29\uC9C0 */
    var closeBtn=document.getElementById('nuttiCartClose')||(panel&&panel.querySelector('.ncp-close'));
    if(closeBtn && !closeBtn._ncCloseBound){
      closeBtn._ncCloseBound=true;
      closeBtn.addEventListener('click',function(e){ e.preventDefault(); e.stopPropagation(); ncpClose(); });
    }
  }
  document.addEventListener('click',function(e){
    if(!panel.classList.contains('is-open'))return;
    var t=e.target;
    if(t.closest&&(t.closest('#nuttiCartBtn')||t.closest('#nuttiCartPanel')))return;
    ncpClose();
  });
  if(document.readyState==='loading'){document.addEventListener('DOMContentLoaded',ncpInit);}
  else{ncpInit();}
  window.addEventListener('load',ncpInit);
  /* \uCD5C\uC801\uD654\uAC00 \uBC84\uD2BC\uC744 \uC7AC\uBC14\uC778\uD574\uB3C4 \uC6B0\uB9AC \uD1A0\uAE00 \uC18C\uC720\uAD8C\uC744 \uB2E4\uC2DC \uD655\uBCF4 */
  setInterval(ncpInit,700);
})();
})();
</script>
